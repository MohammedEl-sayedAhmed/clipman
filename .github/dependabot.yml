version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "deps"
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci"
      include: scope
    # One grouped PR for all Action bumps. Individually, Dependabot
    # split github/codeql-action/init and /analyze into separate PRs;
    # each bumped only one, and CodeQL fails when init and analyze run
    # at different versions ("Loaded a configuration file for version
    # X, but running version Y"). Grouping keeps them in lockstep.
    groups:
      github-actions:
        patterns:
          - "*"
