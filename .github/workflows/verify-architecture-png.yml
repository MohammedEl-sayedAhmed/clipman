name: Verify architecture.png matches architecture.svg

# Catches the case where someone edits docs/architecture.svg without
# regenerating docs/architecture.png. The PNG is needed by the cross-
# post mirror of the writeup, since the dev.to render pipeline does
# not handle SVG inline. Failing here is a much better UX than the
# diagram silently going stale on the cross-post.
#
# The workflow renders the SVG into a temporary path using exactly the
# same renderer that scripts/render-diagram.sh uses locally (cairosvg
# pinned to 2.9.0), then compares the rendered output byte-for-byte to
# the committed PNG. If they differ, the job fails with a clear
# instruction to re-run the script locally. We do NOT auto-push the
# regenerated PNG because pushes from GITHUB_TOKEN do not trigger
# downstream workflows (so required status checks would not re-run on
# the bot commit, leaving the PR unmergeable), and adding a PAT just
# for this rarely-changing diagram is more weight than the convenience
# earns.

on:
  pull_request:
    paths:
      - 'docs/architecture.svg'
      - 'docs/architecture.png'
      - 'scripts/render-diagram.sh'
      - '.github/workflows/verify-architecture-png.yml'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install cairosvg + Pillow
        run: |
          python3 -m pip install --quiet 'cairosvg==2.9.0' 'Pillow>=10,<12'

      - name: Render PNG with cairosvg into a temp location
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          python3 - "docs/architecture.svg" "$tmp/architecture.png" 1600 <<'PY'
          import sys
          import cairosvg
          cairosvg.svg2png(
              url=sys.argv[1],
              write_to=sys.argv[2],
              output_width=int(sys.argv[3]),
          )
          PY
          echo "RENDERED_PNG=$tmp/architecture.png" >> "$GITHUB_ENV"

      - name: Compare rendered output to the committed PNG by pixel content
        run: |
          set -euo pipefail
          python3 - "$RENDERED_PNG" docs/architecture.png <<'PY'
          # PNG byte-equality is too strict — cairosvg's output bytes depend
          # on the libcairo version and embed metadata that varies across
          # machines, so a local-vs-CI byte-cmp fails even when the visible
          # diagram is identical. Instead, compare raw pixel content: load
          # both PNGs into RGBA arrays and check pixel-for-pixel match.
          # That catches real visual drift (the SVG was edited and the PNG
          # wasn't regenerated) but is stable across renderers/runners.
          import sys
          from PIL import Image, ImageChops
          rendered = Image.open(sys.argv[1]).convert("RGBA")
          committed = Image.open(sys.argv[2]).convert("RGBA")
          if rendered.size != committed.size:
              print(
                  f"::error::Size mismatch: rendered={rendered.size}, "
                  f"committed={committed.size}"
              )
              sys.exit(1)
          diff = ImageChops.difference(rendered, committed)
          bbox = diff.getbbox()
          if bbox is not None:
              # Quantify the difference so the failure message points the
              # author at the right action: a tiny diff may just be encoder
              # drift, but a large diff is real staleness.
              w, h = rendered.size
              changed_px = sum(1 for px in diff.getdata() if any(px))
              total_px = w * h
              pct = 100.0 * changed_px / total_px
              print(
                  f"::error::docs/architecture.png does not match a fresh "
                  f"render of docs/architecture.svg."
              )
              print(
                  f"::error::{changed_px}/{total_px} pixels differ "
                  f"({pct:.4f}%), bbox={bbox}."
              )
              print("::error::Regenerate locally with: ./scripts/render-diagram.sh")
              print(
                  "::error::Then commit the updated docs/architecture.png "
                  "alongside the SVG change."
              )
              sys.exit(1)
          print(
              f"docs/architecture.png matches the SVG by pixel content "
              f"({rendered.size[0]}x{rendered.size[1]}, RGBA)."
          )
          PY
