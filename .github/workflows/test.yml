name: Tests

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions: {}

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      # Tests/test_window.py reads this: when set to "1" the GTK4 /
      # libadwaita smoke tests FAIL (instead of skipping) if the
      # typelibs aren't importable. That keeps a future apt-package
      # rename from silently turning the GTK4 suite into a no-op on
      # CI without anyone noticing.
      CLIPMAN_REQUIRE_GTK4: "1"
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            wl-clipboard \
            wtype \
            python3-gi \
            python3-dbus \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            libadwaita-1-0 \
            xvfb \
            libcairo2-dev \
            libgirepository-2.0-dev || \
          sudo apt-get install -y libgirepository1.0-dev

      - name: Install Python dependencies
        run: pip install PyGObject pydbus

      - name: Run tests
        run: xvfb-run -a python -m unittest discover -s tests
