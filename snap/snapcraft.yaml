name: clipman
version: '1.0.0'
summary: Clipboard history manager for GNOME on Wayland
description: |
  A fast, native clipboard manager for Ubuntu/GNOME on Wayland.
  Press Super+V to view your clipboard history, search entries,
  pin favorites, and instantly paste previous copies.

  Features include text and image support, full-text search,
  incognito mode, sensitive data detection, Catppuccin themes,
  reusable snippets, and backup/restore.

base: core22
grade: stable
confinement: strict

architectures:
  - build-on: amd64

slots:
  clipman-dbus:
    interface: dbus
    bus: session
    name: com.clipman.Clipman

apps:
  clipman:
    command: bin/clipman-wrapper
    desktop: share/applications/com.clipman.Clipman.desktop
    plugs:
      - wayland
      - x11
      - desktop
      - desktop-legacy
      - home
      - gsettings
      - opengl

parts:
  wl-clipboard:
    plugin: meson
    source: https://github.com/bugaevc/wl-clipboard/archive/refs/tags/v2.2.1.tar.gz
    build-packages:
      - meson
      - ninja-build
      - libwayland-dev
      - wayland-protocols
      - pkg-config

  clipman:
    plugin: dump
    source: .
    after: [wl-clipboard]
    stage-packages:
      - python3
      - python3-gi
      - python3-dbus
      - gir1.2-gtk-3.0
    override-build: |
      craftctl default
      install -d $CRAFT_PART_INSTALL/share/clipman
      cp -r clipman/ $CRAFT_PART_INSTALL/share/clipman/clipman/
      cp clipman.py $CRAFT_PART_INSTALL/share/clipman/
      cp launcher.sh $CRAFT_PART_INSTALL/share/clipman/
      chmod +x $CRAFT_PART_INSTALL/share/clipman/launcher.sh
      install -Dm644 data/com.clipman.Clipman.desktop $CRAFT_PART_INSTALL/share/applications/com.clipman.Clipman.desktop
      install -Dm644 data/com.clipman.Clipman.svg $CRAFT_PART_INSTALL/share/icons/hicolor/scalable/apps/com.clipman.Clipman.svg
      install -d $CRAFT_PART_INSTALL/bin
      cat > $CRAFT_PART_INSTALL/bin/clipman-wrapper << 'EOF'
      #!/bin/sh
      exec python3 "$SNAP/share/clipman/clipman.py" "$@"
      EOF
      chmod +x $CRAFT_PART_INSTALL/bin/clipman-wrapper
